version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      HTTP_ADDR: ":8080"
      JWT_SECRET: "change-me-in-production"
      JWT_EXPIRED: "24h"
      OPENAPIYAML_LOCATION: "/app/openapi.yaml"
    volumes:
      - ./openapi.yaml:/app/openapi.yaml:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
